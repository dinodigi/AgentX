# Netlify build config. The Next.js runtime plugin translates App Router
# routes/server actions into Netlify functions; env vars are set on the site
# (never here — this file is committed).
[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Custom functions (the scheduled job drainer) live here alongside the Next.js
# plugin's generated functions. jobs-drain.mjs self-declares its cron schedule.
[functions]
  directory = "netlify/functions"
